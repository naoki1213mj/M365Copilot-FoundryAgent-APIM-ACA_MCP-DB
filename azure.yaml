# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: inventory-api

metadata:
  template: inventory-api

infra:
  provider: bicep
  path: ./infra

services:
  inventory-api:
    host: containerapp
    project: ./src
    docker:
      path: ../Dockerfile
      context: ..
      remoteBuild: true
    language: python

hooks:
  postprovision:
    shell: pwsh
    continueOnError: true
    run: |
      & $PSScriptRoot/.venv/Scripts/python.exe $PSScriptRoot/scripts/postprovision.py
